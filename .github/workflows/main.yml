name: Release Tag

on:
  push:
    # GitHub Actions no permite filtrar tags por rama en `on:`.
    # El control real se hace al principio del job comprobando que
    # el commit etiquetado pertenece a `master`.
    tags:
      - "*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CLICKABLE_FRAMEWORK: ubuntu-sdk-20.04
      POEDITOR_API: ${{ secrets.POEDITOR_API }}
      POEDITOR_PROJECT_ID: ${{ secrets.POEDITOR_PROJECT_ID }}
      WEBAPI_ID_FROM: ${{ secrets.WEBAPI_ID_FROM }}
      WEBAPI_ID_TO: ${{ secrets.WEBAPI_ID_TO }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on master
        run: |
          git fetch origin master --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/master

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y adb gettext intltool software-properties-common
          sudo add-apt-repository -y ppa:bhdouglass/clickable
          sudo apt-get update
          sudo apt-get install -y clickable
          python -m pip install --upgrade pip
          python -m pip install polib requests

      - name: Download translations from POEditor
        working-directory: ./po
        env:
          poeditor_api: ${{ env.POEDITOR_API }}
          poeditor_id: ${{ env.POEDITOR_PROJECT_ID }}
        run: |
          cp ../nav/locales/3rdparty/poeditor_pull.py .
          python poeditor_pull.py
          rm -f poeditor_pull.py

      - name: Apply release patches
        run: |
          sed -i -- "s/${WEBAPI_ID_FROM}/${WEBAPI_ID_TO}/g" nav/class/WebAPI.js

      - name: Remove test navigation
        run: |
          sed -i '/TESTING BEGIN/,/TESTING END/d' nav/index.html

      - name: Set version from tag
        run: |
          sed -i -E 's/"version": "[^"]+"/"version": "'"${GITHUB_REF_NAME}"'"/' manifest.json
          sed -i -E 's/(property string applicationVersion: )"[^"]+"/\1"'"${GITHUB_REF_NAME}"'"/' qml/Main.qml

      - name: Build translations
        run: make translations

      - name: Clean intermediate files
        run: |
          make clean
          rm -rf nav/locales/3rdparty

      - name: Remove CI metadata from package sources
        run: rm -rf .github

      - name: Start adb
        run: adb start-server

      - name: Build click package
        run: CLICKABLE_FRAMEWORK=ubuntu-sdk-20.04 clickable build

      - name: Collect package for release
        id: package
        run: |
          package_path="$(find ./build/all/app -type f -name 'navigator.costales_*_all.click' | head -n 1)"
          test -n "$package_path"
          echo "path=$package_path" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: uNav ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.package.outputs.path }}
